<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ShopEasy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">ShopEasy</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
        <a href="login.html">Login</a>
    </div>
</nav>

<div class="auth-container">
    <h2>Login to your account</h2>

    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>

    <input type="text" id="email" placeholder="Email address">
    <input type="password" id="password" placeholder="Password">
    <button onclick="loginUser()">Login</button>

    <div class="switch-link">
        Don't have an account? <a href="register.html">Register here</a>
    </div>
</div>

<script src="app.js"></script>
<script>
    // handle login
    function loginUser() {
        var email = document.getElementById("email").value.trim();
        var password = document.getElementById("password").value.trim();
        var errorEl = document.getElementById("error-msg");
        var successEl = document.getElementById("success-msg");

        errorEl.textContent = "";
        successEl.textContent = "";

        // basic check for empty fields
        if (!email || !password) {
            errorEl.textContent = "Please fill in all fields.";
            return;
        }

        // get saved users from localStorage
        var users = JSON.parse(localStorage.getItem("users")) || [];

        // find matching user
        var matchedUser = null;
        for (var i = 0; i < users.length; i++) {
            if (users[i].email === email && users[i].password === password) {
                matchedUser = users[i];
                break;
            }
        }

        if (!matchedUser) {
            errorEl.textContent = "Wrong email or password. Please try again.";
            return;
        }

        // save logged in user and go to home
        localStorage.setItem("loggedInUser", JSON.stringify(matchedUser));
        successEl.textContent = "Login successful! Redirecting...";

        setTimeout(function() {
            window.location.href = "index.html";
        }, 1000);
    }
</script>
</body>
</html>
