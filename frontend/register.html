<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ShopEasy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">ShopEasy</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
        <a href="login.html">Login</a>
    </div>
</nav>

<div class="auth-container">
    <h2>Create an account</h2>

    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>

    <input type="text" id="name" placeholder="Full name">
    <input type="text" id="email" placeholder="Email address">
    <input type="password" id="password" placeholder="Password (min 6 characters)">
    <input type="password" id="confirm-password" placeholder="Confirm password">
    <button onclick="registerUser()">Register</button>

    <div class="switch-link">
        Already have an account? <a href="login.html">Login here</a>
    </div>
</div>

<script src="app.js"></script>
<script>
    function registerUser() {
        var name = document.getElementById("name").value.trim();
        var email = document.getElementById("email").value.trim();
        var password = document.getElementById("password").value.trim();
        var confirmPass = document.getElementById("confirm-password").value.trim();
        var errorEl = document.getElementById("error-msg");
        var successEl = document.getElementById("success-msg");

        errorEl.textContent = "";
        successEl.textContent = "";

        // check all fields are filled
        if (!name || !email || !password || !confirmPass) {
            errorEl.textContent = "Please fill all the fields.";
            return;
        }

        if (password.length < 6) {
            errorEl.textContent = "Password must be at least 6 characters.";
            return;
        }

        if (password !== confirmPass) {
            errorEl.textContent = "Passwords do not match.";
            return;
        }

        // get existing users list
        var users = JSON.parse(localStorage.getItem("users")) || [];

        // check if email already registered
        for (var i = 0; i < users.length; i++) {
            if (users[i].email === email) {
                errorEl.textContent = "This email is already registered. Try logging in.";
                return;
            }
        }

        // save new user
        var newUser = { name: name, email: email, password: password };
        users.push(newUser);
        localStorage.setItem("users", JSON.stringify(users));

        successEl.textContent = "Account created! Redirecting to login...";

        setTimeout(function() {
            window.location.href = "login.html";
        }, 1200);
    }
</script>
</body>
</html>
